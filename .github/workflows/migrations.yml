name: Migrations Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint migrations
        run: python scripts/cloud_only/lint_migrations.py

